kind = "web"
previewPath = "/"
title = "RHF MUSIC"
version = "1.0.0"
id = "artifacts/rhf-music"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21276

[services.development]
run = "pnpm --filter @workspace/rhf-music run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rhf-music", "run", "build" ]
publicDir = "artifacts/rhf-music/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21276"
BASE_PATH = "/"
